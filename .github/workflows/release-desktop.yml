name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build backend sidecar
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          uv sync --locked --group dev
          uv run pyinstaller \
            --clean \
            --onefile \
            --name "helix-api-${TARGET_TRIPLE}" \
            --paths backend \
            --hidden-import DrissionPage \
            backend/app/run.py

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv "dist/helix-api-${TARGET_TRIPLE}.exe" "apps/desktop/src-tauri/binaries/helix-api-${TARGET_TRIPLE}.exe"
          else
            mv "dist/helix-api-${TARGET_TRIPLE}" "apps/desktop/src-tauri/binaries/helix-api-${TARGET_TRIPLE}"
            chmod +x "apps/desktop/src-tauri/binaries/helix-api-${TARGET_TRIPLE}"
          fi

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Helix ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: "Desktop builds for macOS and Windows."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
