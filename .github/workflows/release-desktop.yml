name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Sync desktop version from release tag
        working-directory: apps/desktop
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          node -e '
            const fs = require("node:fs");
            const version = process.env.RELEASE_TAG.replace(/^v/, "");
            if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
              throw new Error(`Invalid release tag version: ${process.env.RELEASE_TAG}`);
            }

            for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
              const json = JSON.parse(fs.readFileSync(file, "utf8"));
              json.version = version;
              fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
            }

            const cargoFile = "src-tauri/Cargo.toml";
            const cargo = fs.readFileSync(cargoFile, "utf8");
            fs.writeFileSync(cargoFile, cargo.replace(/^version = ".*"$/m, `version = "${version}"`));
          '

      - name: Build backend sidecar
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          uv sync --locked --group dev

          PYINSTALLER_COLLECT_ARGS=(
            --collect-all alembic
            --collect-all apscheduler
            --collect-all DrissionPage
            --collect-all faker
            --collect-all fastapi
            --collect-all httpx
            --collect-all loguru
            --collect-all multipart
            --collect-all phone_gen
            --collect-all pydantic
            --collect-all pydantic_settings
            --collect-all sqlalchemy
            --collect-all sqlmodel
            --collect-all uvicorn
            --collect-all websockets
          )

          uv run pyinstaller \
            --clean \
            --onefile \
            --name "helix-api-${TARGET_TRIPLE}" \
            --paths backend \
            "${PYINSTALLER_COLLECT_ARGS[@]}" \
            --exclude-module app.task_modules.uber \
            backend/app/run.py

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv "dist/helix-api-${TARGET_TRIPLE}.exe" "apps/desktop/src-tauri/binaries/helix-api-${TARGET_TRIPLE}.exe"
          else
            mv "dist/helix-api-${TARGET_TRIPLE}" "apps/desktop/src-tauri/binaries/helix-api-${TARGET_TRIPLE}"
            chmod +x "apps/desktop/src-tauri/binaries/helix-api-${TARGET_TRIPLE}"
          fi

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseCommitish: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.sha }}
          releaseName: Helix ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: "Desktop builds for macOS and Windows."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
